spring:
  application:
    name: midnights-fm
  datasource:
    url: jdbc:mysql://localhost:3306/midnights_fm?createDatabaseIfNotExist=true
    ## docker url: ${SPRING_DATASOURCE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

## logging api (control visible HTTP)
management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info # exposed

api:
  security:
    token:
      secret: ${JWT_SECRET}