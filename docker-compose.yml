version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: midnights_mysql
    restart: always
    environment:
      MYSQL_DATABASE: midnights_fm
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: midnights_api
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/midnights_fm?createDatabaseIfNotExist=true
      JWT_SECRET: test-secret

volumes:
  mysql_data: