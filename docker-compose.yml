version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: midnights_mysql
    restart: always
    environment:
      MYSQL_DATABASE: midnights_fm
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: midnights_api
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      DATABASE_USERNAME: dev
      DATABASE_PASSWORD: dev123
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/midnights_fm?createDatabaseIfNotExist=true
      JWT_SECRET: test-secret

volumes:
  mysql_data: